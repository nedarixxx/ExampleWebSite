<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Заявка принята | AutoGear Master</title>
    <style>
        :root {
            --brand-blue: #5297ff;
            --bg-body: #f7f7f9;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .success-card { background: #fff; padding: 40px; border-radius: 24px; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .icon { width: 64px; height: 64px; background: #ecf6ed; color: #34c759; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        p { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
        .btn { display: inline-flex; justify-content: center; align-items: center; background: var(--brand-blue); color: #000; padding: 12px 32px; border-radius: 50px; font-weight: 600; font-size: 15px; text-decoration: none; transition: all 0.3s ease; }
        .btn:hover { background: #45c0e6; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">✓</div>
        <h1>Заявка успешно принята!</h1>
        <p>Спасибо за обращение. Мастер по ремонту агрегатов свяжется с вами по указанному номеру телефона в течение 5-10 минут для уточнения деталей.</p>
        <a href="/" class="btn">Вернуться на сайт</a>
    </div>

</body>
</html>
